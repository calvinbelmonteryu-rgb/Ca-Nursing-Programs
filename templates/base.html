<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CA RN Tracker{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>CA New Grad RN Tracker</strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if request.path == '/' or request.path == '/programs' %}class="active"{% endif %}>Programs</a></li>
            <li><a href="/timeline" {% if request.path == '/timeline' %}class="active"{% endif %}>Timeline</a></li>
        </ul>
    </nav>

    <main class="{% block main_class %}container{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>CA New Grad RN Program Tracker &bull; NCLEX Target: May 2026</small>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
